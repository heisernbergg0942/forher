<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hey You 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose: #f06e82;
      --deep-rose: #c94060;
      --blush: #fde8ed;
      --cream: #fff8f5;
      --text: #3a2030;
      --muted: #9a7080;
    }

    body {
      min-height: 100vh;
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Floating petals background */
    .petal {
      position: fixed;
      font-size: 1.4rem;
      opacity: 0;
      animation: fall linear infinite;
      pointer-events: none;
      user-select: none;
    }

    @keyframes fall {
      0%   { transform: translateY(-60px) rotate(0deg); opacity: 0.7; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* Card */
    .card {
      background: white;
      border-radius: 28px;
      padding: clamp(2rem, 6vw, 4rem) clamp(1.5rem, 6vw, 4rem);
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 60px rgba(240, 110, 130, 0.18), 0 2px 12px rgba(0,0,0,0.06);
      position: relative;
      z-index: 10;
      animation: popIn 0.7s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .emoji-big {
      font-size: clamp(3rem, 10vw, 5rem);
      line-height: 1;
      margin-bottom: 1rem;
      display: block;
      animation: wiggle 3s ease-in-out infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-5deg); }
      50%       { transform: rotate(5deg); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    h1 em {
      color: var(--rose);
      font-style: italic;
    }

    .subtitle {
      color: var(--muted);
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      font-weight: 300;
      margin-bottom: 2.5rem;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      min-height: 80px;
    }

    .btn {
      border: none;
      border-radius: 50px;
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      line-height: 1;
      white-space: nowrap;
    }

    .btn-yes {
      background: linear-gradient(135deg, var(--rose), var(--deep-rose));
      color: white;
      padding: 0.85em 2em;
      font-size: clamp(1rem, 3vw, 1.15rem);
      box-shadow: 0 4px 20px rgba(240,110,130,0.4);
    }

    .btn-yes:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 28px rgba(240,110,130,0.5);
    }

    .btn-no {
      background: var(--blush);
      color: var(--deep-rose);
      padding: 0.75em 1.6em;
      font-size: 1rem;
      /* size controlled by JS */
    }

    .btn-no:hover {
      transform: scale(1.03);
    }

    /* Yes screen */
    .yes-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .yes-screen.show { display: flex; }

    .yes-screen .big-emoji {
      font-size: clamp(4rem, 15vw, 6rem);
      animation: bounce 0.6s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes bounce {
      from { transform: scale(0); }
      to   { transform: scale(1); }
    }

    .yes-screen h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      color: var(--text);
    }

    .yes-screen p {
      color: var(--muted);
      font-size: clamp(0.9rem, 2.5vw, 1.05rem);
      font-weight: 300;
    }

    .hearts-burst {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    .heart-particle {
      position: absolute;
      font-size: 1.8rem;
      animation: burst 1.2s ease-out forwards;
    }

    @keyframes burst {
      0%   { transform: translate(0,0) scale(0); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(1.4); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Falling petals -->
  <div id="petals"></div>

  <div class="card">
    <!-- Question state -->
    <div id="question">
      <span class="emoji-big">🌸</span>
      <h1>Did you know that<br>you are <em>pretty?</em></h1>
      <p class="subtitle">Be honest. The universe needs to know.</p>
      <div class="buttons">
        <button class="btn btn-yes" onclick="onYes()">Yes, I know 🥰</button>
        <button class="btn btn-no" id="noBtn" onclick="onNo()">No…</button>
      </div>
    </div>

    <!-- Yes screen -->
    <div id="yesScreen" class="yes-screen">
      <span class="big-emoji">💖</span>
      <h2>Of course you are!</h2>
      <p>The prettiest person I know. 🌷<br>Never forget it.</p>
    </div>
  </div>

  <!-- Heart burst container -->
  <div class="hearts-burst" id="heartsBurst"></div>

<script>
  // --- Falling petals ---
  const petalContainer = document.getElementById('petals');
  const EMOJIS = ['🌸','🌷','💗','✨','🍀','💕'];

  function spawnPetal() {
    const el = document.createElement('span');
    el.className = 'petal';
    el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (Math.random() * 1.2 + 0.8) + 'rem';
    const dur = Math.random() * 6 + 5;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = Math.random() * -dur + 's';
    petalContainer.appendChild(el);
    setTimeout(() => el.remove(), (dur + 1) * 1000);
  }

  for (let i = 0; i < 18; i++) spawnPetal();
  setInterval(spawnPetal, 800);

  // --- No button growing ---
  const noBtn = document.getElementById('noBtn');
  let noClicks = 0;
  const messages = [
    'No…', 'Are you sure?', 'Really??', 'Think again 🤔',
    'Nope, wrong!', 'Try YES 😅', 'Last chance…', 'Trust me 🌸'
  ];

  function onNo() {
    noClicks++;
    // Grow the button — capped so it doesn't break layout
    const newSize = Math.min(0.9 + noClicks * 0.22, 3.2);
    noBtn.style.fontSize = newSize + 'rem';
    noBtn.style.padding = '0.75em 1.6em';

    // Change label
    const msg = messages[Math.min(noClicks, messages.length - 1)];
    noBtn.textContent = msg;

    // After enough clicks, start moving the button away on hover
    if (noClicks >= 4) {
      noBtn.onmouseenter = moveNoBtn;
      noBtn.ontouchstart = moveNoBtn;
    }
  }

  function moveNoBtn() {
    const card = document.querySelector('.card');
    const cardRect = card.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();
    const maxX = cardRect.width - btnRect.width - 20;
    const maxY = cardRect.height - btnRect.height - 20;
    noBtn.style.position = 'absolute';
    noBtn.style.left = Math.random() * Math.max(maxX, 10) + 'px';
    noBtn.style.top  = Math.random() * Math.max(maxY, 10) + 'px';
  }

  // Make card relative for absolute positioning of noBtn
  document.querySelector('.card').style.position = 'relative';

  // --- Yes ---
  function onYes() {
    document.getElementById('question').style.display = 'none';
    document.getElementById('yesScreen').classList.add('show');
    spawnHearts();
  }

  function spawnHearts() {
    const container = document.getElementById('heartsBurst');
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    for (let i = 0; i < 28; i++) {
      const h = document.createElement('span');
      h.className = 'heart-particle';
      h.textContent = ['💖','💗','💕','❤️','🌸'][Math.floor(Math.random()*5)];
      const angle = Math.random() * 360;
      const dist = 80 + Math.random() * 220;
      const tx = Math.cos(angle * Math.PI/180) * dist + 'px';
      const ty = Math.sin(angle * Math.PI/180) * dist + 'px';
      h.style.setProperty('--tx', tx);
      h.style.setProperty('--ty', ty);
      h.style.left = cx + 'px';
      h.style.top  = cy + 'px';
      h.style.animationDelay = Math.random() * 0.4 + 's';
      container.appendChild(h);
      setTimeout(() => h.remove(), 1800);
    }
  }
</script>
</body>
</html>
